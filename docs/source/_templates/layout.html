{# Import the theme's layout. #}

{%- block font %}

{%- endblock %}

{%- block extrahead %} 
    <script async src="{{ pathto('_static/vendor/es-module-shims/1.8.0/es-module-shims.js', 1) }}"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "{{ pathto('_static/vendor/three/0.155/build/three.module.js', 1) }}",
          "three/addons/": "{{ pathto('_static/vendor/three/0.155/examples/jsm/', 1) }}"

    </script>
    <!-- Plausible start -->
    <script defer data-domain="chipsee.com" src="https://plausible.io/js/script.js"></script>
    <!-- Plausible end -->
{% endblock %}


{%- block footer_scripts %}

    <script async src="{{ pathto('_static/js/material_custom.js', 1) }}"></script>
